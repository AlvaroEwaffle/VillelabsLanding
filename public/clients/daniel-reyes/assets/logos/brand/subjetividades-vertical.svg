<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" fill="none">
  <!-- SUBJETIVIDADES CENTRO PSICOLOGICA CLINICA - Vertical Logo
       Layout: Isotipo top + text below
       Palette: Teal-600 (#0d9488), Slate-900 (#1a2332), Slate-500 (#64748b) -->

  <!-- Isotipo (centered) -->
  <g transform="translate(68, 4)">
    <circle cx="32" cy="32" r="30" fill="#0d9488"/>
    <path d="M22 14 C22 14 28 12 32 14 C38 17 40 22 38 28 C37 31 34 33 30 33 C26 33 24 31 22 28"
          stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M42 50 C42 50 36 52 32 50 C26 47 24 42 26 36 C27 33 30 31 34 31 C38 31 40 33 42 36"
          stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M30 33 C28 34 28 36 30 37 M34 31 C36 30 36 28 34 27"
          stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
    <circle cx="32" cy="32" r="3" fill="#ffffff" opacity="0.9"/>
    <circle cx="32" cy="32" r="10" stroke="#ffffff" stroke-width="0.75" fill="none" opacity="0.25"/>
    <circle cx="32" cy="32" r="18" stroke="#ffffff" stroke-width="0.5" fill="none" opacity="0.15"/>
  </g>

  <!-- Brand name -->
  <text x="100" y="90" font-family="DM Sans, sans-serif" font-size="18" font-weight="700" fill="#1a2332" text-anchor="middle" letter-spacing="0.08em">SUBJETIVIDADES</text>

  <!-- Divider line -->
  <line x1="50" y1="100" x2="150" y2="100" stroke="#0d9488" stroke-width="1" opacity="0.4"/>

  <!-- Subtitle -->
  <text x="100" y="116" font-family="DM Sans, sans-serif" font-size="10" font-weight="500" fill="#64748b" text-anchor="middle" letter-spacing="0.14em">CENTRO PSICOLOGICA</text>
  <text x="100" y="130" font-family="DM Sans, sans-serif" font-size="10" font-weight="500" fill="#64748b" text-anchor="middle" letter-spacing="0.14em">CLINICA</text>
</svg>
